<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QA</title>
  <style>
    body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; padding: 2rem; }
    h1 { color: #fff; }
    .instructions { color: #888; margin-bottom: 2rem; }
  </style>
</head>
<body>
  <h1>QA</h1>
  <p class="instructions">Open the browser console (Cmd+Option+J / Ctrl+Shift+J) to see output.</p>

  <script type="module">
    import { generateShades } from './assets/js/colorModels/index.js';
    import {
      hexToOklch, clampToSrgbGamut, oklchToOklab,
      hexToSrgb, srgbToLinearRgb, linearRgbToOklab
    } from './assets/js/colorModels/convert.js';

    // ── Helpers ──────────────────────────────────────────────

    /** Convert hex to OKLab {L, a, b} */
    function hexToOklab(hex) {
      return linearRgbToOklab(srgbToLinearRgb(hexToSrgb(hex)));
    }

    /** ΔE in OKLab (simple Euclidean) */
    function deltaE(hex1, hex2) {
      const a = hexToOklab(hex1);
      const b = hexToOklab(hex2);
      return Math.sqrt((a.L - b.L) ** 2 + (a.a - b.a) ** 2 + (a.b - b.b) ** 2);
    }

    /** ΔE between two OKLab objects */
    function deltaELab(labA, labB) {
      return Math.sqrt((labA.L - labB.L) ** 2 + (labA.a - labB.a) ** 2 + (labA.b - labB.b) ** 2);
    }

    /** Parse hex to {r, g, b} in 0-255 */
    function hexToRgb255(hex) {
      const s = hexToSrgb(hex);
      return {
        r: Math.round(s.r * 255),
        g: Math.round(s.g * 255),
        b: Math.round(s.b * 255)
      };
    }

    // ── Golden cases ─────────────────────────────────────────
    // Covers blue, red, pink-red, yellow, neutral, teal at steps=11
    // plus temp=0 cases for §1.5.

    const QACases = [
      // Blue
      { base: '#2F6FED', temp: +1, steps: 11, mode: 'conservative' },
      { base: '#2F6FED', temp: -1, steps: 11, mode: 'conservative' },
      { base: '#2F6FED', temp: +1, steps: 11, mode: 'creative' },
      { base: '#2F6FED', temp: -1, steps: 11, mode: 'creative' },
      // Red
      { base: '#B51A00', temp: +1, steps: 11, mode: 'creative' },
      { base: '#B51A00', temp: -1, steps: 11, mode: 'creative' },
      // Pink-red
      { base: '#E63B7A', temp: -1, steps: 11, mode: 'creative' },
      // Yellow
      { base: '#FEC700', temp: +1, steps: 11, mode: 'conservative' },
      { base: '#FEC700', temp: -1, steps: 11, mode: 'conservative' },
      { base: '#FEC700', temp: -1, steps: 11, mode: 'creative' },
      // Neutral
      { base: '#e9e9e9', temp: +1, steps: 11, mode: 'conservative' },
      { base: '#e9e9e9', temp: -1, steps: 11, mode: 'conservative' },
      { base: '#e9e9e9', temp: +1, steps: 11, mode: 'creative' },
      { base: '#e9e9e9', temp: -1, steps: 11, mode: 'creative' },
      // Teal
      { base: '#47868B', temp: +1, steps: 11, mode: 'conservative' },
      { base: '#47868B', temp: -1, steps: 11, mode: 'conservative' },
      { base: '#47868B', temp: +1, steps: 11, mode: 'creative' },
      { base: '#47868B', temp: -1, steps: 11, mode: 'creative' },
      // Temperature-zero cases for §1.5
      { base: '#2F6FED', temp: 0, steps: 11, mode: 'creative' },
      { base: '#B51A00', temp: 0, steps: 11, mode: 'creative' },
      { base: '#FEC700', temp: 0, steps: 11, mode: 'creative' },
      { base: '#e9e9e9', temp: 0, steps: 11, mode: 'creative' },
      { base: '#47868B', temp: 0, steps: 11, mode: 'creative' },
      { base: '#EC4545', temp: 0, steps: 9,  mode: 'creative' },
    ];

    // ── Run ──────────────────────────────────────────────────

    function runQA() {
      console.clear();

      let hardFails = 0;
      const warnings = [];   // { base, message }

      // Pre-generate all shades once
      const shades = QACases.map(tc => ({
        ...tc,
        shades: generateShades(tc.base, tc.temp, tc.steps, tc.mode),
      }));

      // Helper to label a case
      const label = tc => `${tc.base} temp=${tc.temp > 0 ? '+' : ''}${tc.temp} ${tc.mode}`;

      // ── Tier 1: Hard FAILs ──────────────────────────────

      console.log('='.repeat(60));
      console.log('TIER 1 — HARD CHECKS');
      console.log('='.repeat(60));

      // §1.1 Monotonic lightness (strict increase)
      console.log('');
      console.log('§1.1 Monotonic lightness');
      const failsBefore_1_1 = hardFails;
      for (const tc of shades) {
        let prev = -Infinity;
        for (let i = 0; i < tc.shades.length; i++) {
          const L = hexToOklch(tc.shades[i]).L;
          if (L <= prev) {
            hardFails++;
            console.log(`  FAIL  ${label(tc)} — step ${i} L=${L.toFixed(4)} <= prev ${prev.toFixed(4)}`);
          }
          prev = L;
        }
      }
      if (hardFails === failsBefore_1_1) console.log('  all pass');

      // §1.2 Midpoint anchoring (mid step must equal base hex)
      console.log('');
      console.log('§1.2 Midpoint anchoring');
      const failsBefore_1_2 = hardFails;
      for (const tc of shades) {
        const mid = Math.floor(tc.steps / 2);
        const midHex = tc.shades[mid].toUpperCase();
        const baseHex = tc.base.toUpperCase();
        if (midHex !== baseHex) {
          hardFails++;
          console.log(`  FAIL  ${label(tc)} — base=${baseHex}  mid[${mid}]=${midHex}`);
        }
      }
      if (hardFails === failsBefore_1_2) console.log('  all pass');

      // §1.3 No dead steps (no adjacent duplicate hexes)
      console.log('');
      console.log('§1.3 No dead steps');
      const failsBefore_1_3 = hardFails;
      for (const tc of shades) {
        for (let i = 1; i < tc.shades.length; i++) {
          if (tc.shades[i].toUpperCase() === tc.shades[i - 1].toUpperCase()) {
            hardFails++;
            console.log(`  FAIL  ${label(tc)} — steps ${i - 1} and ${i} both ${tc.shades[i]}`);
          }
        }
      }
      if (hardFails === failsBefore_1_3) console.log('  all pass');

      // §1.4 Gamut safety (every hex must parse to valid 0-255 RGB)
      console.log('');
      console.log('§1.4 Gamut safety');
      const failsBefore_1_4 = hardFails;
      for (const tc of shades) {
        for (let i = 0; i < tc.shades.length; i++) {
          const rgb = hexToRgb255(tc.shades[i]);
          const valid = [rgb.r, rgb.g, rgb.b].every(v =>
            Number.isFinite(v) && v >= 0 && v <= 255
          );
          if (!valid) {
            hardFails++;
            console.log(`  FAIL  ${label(tc)} — step ${i} ${tc.shades[i]} invalid RGB (${rgb.r},${rgb.g},${rgb.b})`);
          }
        }
      }
      if (hardFails === failsBefore_1_4) console.log('  all pass');

      // §1.5 Temperature-zero neutrality
      // Non-circular baseline: for each step, take the algorithm's output L and C
      // but fix H to baseH. This isolates the hue-cast contribution from the
      // legitimate chroma shaping (chroma curve + highlight falloff).
      // Baseline: clampToSrgbGamut({ L: step_L, C: step_C, H: baseH })
      // Hue drift check: only when step C >= 0.04 and L >= 0.15.
      // Below C=0.04 hex round-trip hue noise is ±2-3° (atan2 instability).
      // Below L=0.15, 8-bit channels are tiny integers with coarse quantisation.
      console.log('');
      console.log('§1.5 Temperature-zero neutrality');
      const failsBefore_1_5 = hardFails;
      const tempZeroCases = shades.filter(tc => tc.temp === 0);
      const HUE_DRIFT_C_MIN = 0.04;  // min chroma for hue to survive hex round-trip
      const HUE_DRIFT_L_MIN = 0.15;  // min lightness (dark-step quantisation guard)
      for (const tc of tempZeroCases) {
        const baseOklch = hexToOklch(tc.base);
        let maxHueDrift = 0;
        let maxDE = 0;
        let worstStepDE = -1;
        let worstStepHue = -1;

        for (let i = 0; i < tc.shades.length; i++) {
          const mid = Math.floor(tc.steps / 2);
          if (i === mid) continue; // midpoint is pinned, skip

          const stepOklch = hexToOklch(tc.shades[i]);

          // Baseline: algorithm's own L and C, but base hue — isolates cast
          const baselineOklch = clampToSrgbGamut({
            L: stepOklch.L,
            C: stepOklch.C,
            H: baseOklch.H
          });
          const baselineLab = oklchToOklab(baselineOklch);
          const stepLab = hexToOklab(tc.shades[i]);

          const de = deltaELab(stepLab, baselineLab);
          if (de > maxDE) { maxDE = de; worstStepDE = i; }

          // Hue drift: only meaningful when step has enough chroma and isn't too dark
          if (stepOklch.C >= HUE_DRIFT_C_MIN && stepOklch.L >= HUE_DRIFT_L_MIN) {
            let hDiff = Math.abs(stepOklch.H - baseOklch.H);
            if (hDiff > 180) hDiff = 360 - hDiff;
            if (hDiff > maxHueDrift) { maxHueDrift = hDiff; worstStepHue = i; }
          }
        }

        if (maxHueDrift > 2) {
          hardFails++;
          console.log(`  FAIL  ${label(tc)} — max hue drift ${maxHueDrift.toFixed(2)}° at step ${worstStepHue} (limit 2°)`);
        }
        if (maxDE > 0.005) {
          hardFails++;
          console.log(`  FAIL  ${label(tc)} — max ΔE from baseline ${maxDE.toFixed(4)} at step ${worstStepDE} (limit 0.005)`);
        }
      }
      if (hardFails === failsBefore_1_5) console.log('  all pass');

      // §1.6 Tinted endpoints (C > 0.005 when temp != 0, unless near sRGB ceiling)
      // Skip enforcement when endpoint L >= 0.98 (near-white can't hold chroma)
      console.log('');
      console.log('§1.6 Tinted endpoints');
      const failsBefore_1_6 = hardFails;
      const ENDPOINT_L_CEILING = 0.98;
      const ENDPOINT_C_MIN = 0.005;
      const tempNonZeroCases = shades.filter(tc => tc.temp !== 0);
      for (const tc of tempNonZeroCases) {
        const endpoints = [
          { idx: 0, hex: tc.shades[0] },
          { idx: tc.shades.length - 1, hex: tc.shades[tc.shades.length - 1] }
        ];
        for (const ep of endpoints) {
          const oklch = hexToOklch(ep.hex);
          if (oklch.L >= ENDPOINT_L_CEILING) continue; // near ceiling, skip
          if (oklch.C < ENDPOINT_C_MIN) {
            hardFails++;
            console.log(`  FAIL  ${label(tc)} — step ${ep.idx} C=${oklch.C.toFixed(4)} < ${ENDPOINT_C_MIN} (endpoint must be tinted)`);
          }
        }
      }
      if (hardFails === failsBefore_1_6) console.log('  all pass');

      // ── Tier 2: Soft WARNs ──────────────────────────────

      console.log('');
      console.log('='.repeat(60));
      console.log('TIER 2 — SOFT WARNINGS');
      console.log('='.repeat(60));

      // Collect unique bases that have visible chroma (C >= 0.02 at midpoint).
      const chromaBases = [...new Set(QACases.map(tc => tc.base))].filter(base => {
        const oklch = hexToOklch(base);
        return oklch.C >= 0.02;
      });

      // "Top 3 highlights" = last 3 steps, "Bottom 3 shadows" = first 3 steps.
      const top3 = (steps) => [steps - 3, steps - 2, steps - 1];
      const bot3 = () => [0, 1, 2];

      // Chroma below this: treat hue/tint as meaningless (skip pair if BOTH are below)
      const LOW_C = 0.01;

      // Treat near-white highlights differently (small tints are all you can get)
      const NEAR_WHITE_L = 0.95;

      // Pragmatic ΔE thresholds
      const DE_THRESHOLD_NORMAL = 0.03;
      const DE_THRESHOLD_NEAR_WHITE = 0.015;

      function isNearWhite(hex) {
        return hexToOklch(hex).L >= NEAR_WHITE_L;
      }

      function thresholdForPair(hexA, hexB) {
        return (isNearWhite(hexA) || isNearWhite(hexB))
          ? DE_THRESHOLD_NEAR_WHITE
          : DE_THRESHOLD_NORMAL;
      }

      // Return { maxDE, maxAtStep, comparedAny }
      function maxDeltaEOverRegion(shadesA, shadesB, indices) {
        let maxDE = 0;
        let maxAtStep = null;
        let comparedAny = false;

        for (const i of indices) {
          const hexA = shadesA[i];
          const hexB = shadesB[i];
          const cA = hexToOklch(hexA).C;
          const cB = hexToOklch(hexB).C;
          if (cA < LOW_C && cB < LOW_C) continue;
          comparedAny = true;
          const de = deltaE(hexA, hexB);
          if (de > maxDE) { maxDE = de; maxAtStep = i; }
        }
        return { maxDE, maxAtStep, comparedAny };
      }

      function thresholdForMaxStep(shadesA, shadesB, maxAtStep) {
        if (maxAtStep == null) return DE_THRESHOLD_NORMAL;
        return thresholdForPair(shadesA[maxAtStep], shadesB[maxAtStep]);
      }

      // §2.1 Temperature sensitivity (warm vs cool, same mode)
      console.log('');
      console.log('§2.1 Temperature sensitivity (warm vs cool, same mode)');

      for (const base of chromaBases) {
        const modes = [...new Set(QACases.filter(tc => tc.base === base).map(tc => tc.mode))];
        for (const mode of modes) {
          const warm = shades.find(tc => tc.base === base && tc.mode === mode && tc.temp > 0);
          const cool = shades.find(tc => tc.base === base && tc.mode === mode && tc.temp < 0);
          if (!warm || !cool) continue;

          // Check highlights and shadows
          const regions = [
            { name: 'highlights', indices: top3(warm.steps) },
            { name: 'shadows', indices: bot3() },
          ];
          let anyRegionPasses = false;
          for (const region of regions) {
            const { maxDE, maxAtStep, comparedAny } = maxDeltaEOverRegion(warm.shades, cool.shades, region.indices);
            const thresh = thresholdForMaxStep(warm.shades, cool.shades, maxAtStep);
            if (comparedAny && maxDE >= thresh) anyRegionPasses = true;
          }
          if (!anyRegionPasses) {
            const msg = `${mode}: warm vs cool indistinguishable in top-3 highlights and bottom-3 shadows`;
            warnings.push({ base, message: msg });
            console.log(`  WARN  ${base} ${mode} — ${msg}`);
          }
        }
      }

      // §2.2 Mode separation (conservative vs creative, same temp)
      console.log('');
      console.log('§2.2 Mode separation (conservative vs creative, same temp)');

      for (const base of chromaBases) {
        const temps = [...new Set(QACases.filter(tc => tc.base === base).map(tc => tc.temp))];
        for (const temp of temps) {
          if (temp === 0) continue; // modes don't differ at temp=0
          const cons = shades.find(tc => tc.base === base && tc.temp === temp && tc.mode === 'conservative');
          const paint = shades.find(tc => tc.base === base && tc.temp === temp && tc.mode === 'creative');
          if (!cons || !paint) continue;

          const regions = [
            { name: 'highlights', indices: top3(cons.steps) },
            { name: 'shadows', indices: bot3() },
          ];
          let anyRegionPasses = false;
          for (const region of regions) {
            const { maxDE, maxAtStep, comparedAny } = maxDeltaEOverRegion(cons.shades, paint.shades, region.indices);
            const thresh = thresholdForMaxStep(cons.shades, paint.shades, maxAtStep);
            if (comparedAny && maxDE >= thresh) anyRegionPasses = true;
          }
          if (!anyRegionPasses) {
            const tempLabel = temp > 0 ? 'warm' : 'cool';
            const msg = `${tempLabel}: conservative vs creative indistinguishable in top-3 highlights and bottom-3 shadows`;
            warnings.push({ base, message: msg });
            console.log(`  WARN  ${base} ${tempLabel} — ${msg}`);
          }
        }
      }

      // §2.3 Perceptual step spacing (max/min ΔE ratio within each half)
      console.log('');
      console.log('§2.3 Perceptual step spacing (max/min ΔE ratio per half)');
      const SPACING_RATIO_LIMIT = 4;

      for (const tc of shades) {
        if (tc.temp === 0) continue; // temp=0 has no cast, spacing is trivially even
        const mid = Math.floor(tc.steps / 2);

        // Compute adjacent ΔE for each half
        const halves = [
          { name: 'shadow', start: 0, end: mid },
          { name: 'highlight', start: mid, end: tc.shades.length - 1 },
        ];

        for (const half of halves) {
          if (half.end - half.start < 2) continue; // need at least 2 intervals
          const deltas = [];
          for (let i = half.start; i < half.end; i++) {
            deltas.push(deltaE(tc.shades[i], tc.shades[i + 1]));
          }
          const minDE = Math.min(...deltas);
          const maxDE = Math.max(...deltas);
          if (minDE > 0) {
            const ratio = maxDE / minDE;
            if (ratio > SPACING_RATIO_LIMIT) {
              const worstIdx = deltas.indexOf(maxDE) + half.start;
              const msg = `${half.name}: ΔE ratio ${ratio.toFixed(1)}:1 (max=${maxDE.toFixed(4)} at ${worstIdx}-${worstIdx + 1}, min=${minDE.toFixed(4)})`;
              warnings.push({ base: tc.base, message: msg });
              console.log(`  WARN  ${label(tc)} — ${msg}`);
            }
          }
        }
      }

      // ── Summary ─────────────────────────────────────────

      console.log('');
      console.log('='.repeat(60));
      console.log('SUMMARY');
      console.log('='.repeat(60));
      console.log(`  Cases:    ${shades.length}`);
      console.log(`  FAIL:     ${hardFails}`);
      console.log(`  WARN:     ${warnings.length}`);

      if (warnings.length > 0) {
        console.log('');
        console.log('  Warnings by base:');
        const grouped = {};
        for (const w of warnings) {
          (grouped[w.base] ??= []).push(w.message);
        }
        for (const [base, msgs] of Object.entries(grouped)) {
          console.log(`    ${base}`);
          for (const m of msgs) console.log(`      - ${m}`);
        }
      }

      console.log('');
      if (hardFails > 0) {
        console.log(`RESULT: ${hardFails} hard fail(s) — see above.`);
      } else {
        console.log('RESULT: All hard checks pass.');
      }
      console.log('='.repeat(60));
    }

    window.runQA = runQA;
    runQA();
  </script>
</body>
</html>
